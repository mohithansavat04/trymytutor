<div class="view-section hidden" id="profileView">
    <div class="flex min-h-screen">
      <div class="flex-1 p-8 h-screen overflow-y-auto">
        <div class="max-w-2xl mx-auto">
          <div class="flex justify-between items-center mb-8">
            <div>
              <h1 class="text-4xl font-bold mb-2">My Profile</h1>
              <p class="text-slate-400">Update your account details and credentials</p>
            </div>
          </div>
          
          <div class="glass-card border border-brand-border rounded-2xl p-8">
            <form id="profileForm" class="space-y-6">
              <div>
                <label for="profileName" class="block text-sm font-semibold text-slate-400 uppercase mb-2">Full Name</label>
                <input type="text" id="profileName" required
                  class="w-full px-4 py-3 bg-slate-900/60 border border-slate-700 rounded-xl focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand text-white placeholder-slate-600 transition-all shadow-inner">
              </div>
              
              <div>
                <label for="profileEmail" class="block text-sm font-semibold text-slate-400 uppercase mb-2">Email Address</label>
                <input type="email" id="profileEmail" required
                  class="w-full px-4 py-3 bg-slate-900/60 border border-slate-700 rounded-xl focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand text-white placeholder-slate-600 transition-all shadow-inner">
              </div>

              <div class="pt-6 border-t border-slate-700/50 mt-6">
                <h3 class="text-lg font-semibold text-white mb-4">Change Password</h3>
                <label for="profilePassword" class="block text-sm font-semibold text-slate-400 uppercase mb-2">New Password (leave blank to keep current)</label>
                <input type="password" id="profilePassword" placeholder="••••••••"
                  class="w-full px-4 py-3 bg-slate-900/60 border border-slate-700 rounded-xl focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand text-white placeholder-slate-600 transition-all shadow-inner">
              </div>

              <div class="flex justify-end pt-6 mt-6">
                <button type="submit" id="saveProfileBtn"
                  class="px-8 py-3.5 bg-brand hover:bg-orange-500 text-white font-semibold rounded-xl shadow-lg shadow-brand/20 transition-all active:scale-95 flex items-center">
                  Save Changes
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

<div class="view-section hidden" id="categoriesView">
  <div class="flex justify-between items-center mb-10">
    <h1 class="text-3xl font-bold">Subjects & Hobbies</h1>
    <div class="relative ml-4 flex-grow max-w-md">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
      <input type="text" id="searchCategories" placeholder="Search categories..." class="pl-10 pr-4 py-2 bg-slate-900/50 border border-brand-border rounded-lg focus:outline-none focus:border-brand text-sm w-full text-white">
    </div>
    <button id="openAddCategoryModal" class="px-6 py-2.5 bg-brand text-white font-medium rounded-lg shadow-lg shadow-brand/30 hover:-translate-y-0.5 hover:shadow-brand/50 transition-all flex items-center">
      <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
      </svg>
      Add New Category
    </button>
  </div>
  
  <div class="glass-card rounded-2xl border border-brand-border overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-slate-800/50 text-slate-400 text-xs uppercase tracking-wider">
          <th class="px-6 py-4 font-semibold">Name</th>
          <th class="px-6 py-4 font-semibold">Type</th>
          <th class="px-6 py-4 font-semibold">Classes</th>
          <th class="px-6 py-4 font-semibold">Days/Times</th>
          <th class="px-6 py-4 font-semibold text-right">Actions</th>
        </tr>
      </thead>
      <tbody id="categoriesTableBody" class="divide-y divide-brand-border">
        <!-- Categories injected here -->
      </tbody>
    </table>
    <div id="paginationCategories" class="flex justify-between items-center mt-6 p-4 border-t border-brand-border bg-slate-800/50"></div>
  </div>
</div>
